---
- name: Install PostgreSQL
  apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
    state: present
  become: yes

- name: Ensure PostgreSQL service is started
  service:
    name: postgresql
    state: started
    enabled: yes
  become: yes

- name: Create application database
  postgresql_db:
    name: "{{ postgres_db }}"
    state: present
  become: yes
  become_user: postgres

- name: Create application database user
  postgresql_user:
    name: "{{ postgres_user }}"
    password: "{{ postgres_password }}"
    priv: "ALL/{{ postgres_db }}:ALL"
    state: present
  become: yes
  become_user: postgres

- name: Configure PostgreSQL to listen on all interfaces (local env only)
  lineinfile:
    path: /etc/postgresql/14/main/postgresql.conf
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '*'"
  become: yes
  notify: Restart PostgreSQL
  when: env == 'local'

- name: Allow remote connections from Docker network (local env only)
  lineinfile:
    path: /etc/postgresql/14/main/pg_hba.conf
    line: "host    all             all             172.0.0.0/8            md5"
  become: yes
  notify: Restart PostgreSQL
  when: env == 'local'
