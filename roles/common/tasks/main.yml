---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: Install common packages
  apt:
    name:
      - curl
      - vim
      - htop
      - git
      - ufw
    state: present
  become: yes

- name: Set timezone to America/Sao_Paulo
  timezone:
    name: America/Sao_Paulo
  become: yes

- name: Create app directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0755"
  loop:
    - /opt/{{ app_name }}
    - /opt/{{ app_name }}/logs
    - /opt/{{ app_name }}/config
  become: yes
